name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check version
        run: bun run version:check

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Package smoke test
        run: |
          test -f apps/cli/dist/index.js
          bun run apps/cli/dist/index.js doctor || true
